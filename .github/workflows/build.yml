name: Build & Release

# Триггер: push любого тега вида v0.9.4, v1.0.0 и т.д.
# Шаги: установить Python и зависимости, скачать sing-box.exe,
# собрать MeDVeD.exe через PyInstaller, прикрепить к Release.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # нужно для создания GitHub Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Download sing-box.exe (PINNED version for windows-amd64)
        shell: powershell
        env:
          # Pinned for reproducible builds. To bump: change this, rebuild, run the
          # app against real servers (sing-box can break configs between versions
          # — see the 1.13 migration), THEN tag a release. Never auto-track latest.
          SINGBOX_VERSION: "1.13.12"
        run: |
          $ErrorActionPreference = 'Stop'
          $ver = $env:SINGBOX_VERSION
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/SagerNet/sing-box/releases/tags/v$ver" -Headers @{ "User-Agent" = "MeDVeD-CI" }
          $asset = $release.assets | Where-Object { $_.name -match "windows-amd64.*\.zip$" } | Select-Object -First 1
          if (-not $asset) { throw "No windows-amd64 zip found in sing-box v$ver" }
          Write-Output "Downloading $($asset.name) (pinned v$ver)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile sing-box.zip
          Expand-Archive sing-box.zip -DestinationPath sing-box-extract
          $exePath = Get-ChildItem -Path sing-box-extract -Recurse -Filter "sing-box.exe" | Select-Object -First 1
          if (-not $exePath) { throw "sing-box.exe not found in archive" }
          Copy-Item $exePath.FullName -Destination .\sing-box.exe -Force
          # Verify the bundled binary actually reports the pinned version.
          $line = (& .\sing-box.exe version | Select-String -Pattern 'sing-box version (\S+)')
          $reported = $line.Matches.Groups[1].Value
          Write-Output "sing-box.exe reports: $reported ($((Get-Item sing-box.exe).Length) bytes)"
          if ($reported -ne $ver) { throw "sing-box version mismatch: expected $ver, got $reported" }

      - name: Build onedir (PyInstaller)
        run: pyinstaller --noconfirm MeDVeD.spec

      - name: Verify onedir build
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Output "=== dist\MeDVeD (top level) ==="
          Get-ChildItem dist\MeDVeD | Select-Object Name, @{N='MB';E={[math]::Round($_.Length/1MB,2)}}
          if (-not (Test-Path dist\MeDVeD\MeDVeD.exe)) { throw "dist\MeDVeD\MeDVeD.exe missing after pyinstaller" }
          Write-Output ("MeDVeD.exe: {0} MB" -f [math]::Round((Get-Item dist\MeDVeD\MeDVeD.exe).Length/1MB,2))
          $internal = "dist\MeDVeD\_internal"
          $py = Get-ChildItem $internal -Filter "python3*.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $py) { throw "python3xx.dll missing from _internal" }
          Write-Output ("python dll: {0}" -f $py.Name)
          $sb = @("$internal\sing-box.exe","dist\MeDVeD\sing-box.exe") | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $sb) { throw "sing-box.exe not found in build output" }
          Write-Output ("sing-box.exe: {0} ({1} MB)" -f $sb, [math]::Round((Get-Item $sb).Length/1MB,2))

      - name: Build installer with Inno Setup
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $ver = "${{ github.ref_name }}" -replace '^v',''
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Output "Inno Setup not preinstalled, installing via choco..."
            choco install innosetup -y --no-progress
          }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found after install attempt" }
          & $iscc "/DMyAppVersion=$ver" MeDVeD.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup compile failed (exit $LASTEXITCODE)" }
          Get-ChildItem installer_output | ForEach-Object {
            Write-Output ("installer: {0}  {1} MB" -f $_.Name, [math]::Round($_.Length/1MB,2))
          }
          $setup = "installer_output\MeDVeD-Setup-$ver.exe"
          if (-not (Test-Path $setup)) {
            throw "$setup not produced"
          }
          # Publish a SHA-256 checksum next to the installer. The auto-updater
          # verifies it before running the downloaded installer (defence against
          # a corrupted/tampered download), and users can verify manually.
          $hash = (Get-FileHash $setup -Algorithm SHA256).Hash.ToLower()
          $checksumLine = "$hash  MeDVeD-Setup-$ver.exe"
          [System.IO.File]::WriteAllText(
            (Join-Path (Get-Location).Path "$setup.sha256"),
            "$checksumLine`n",
            (New-Object System.Text.ASCIIEncoding)
          )
          Write-Output "sha256: $hash"

      - name: Extract release notes for this tag from CHANGELOG.md
        shell: powershell
        run: |
          # Pull the "## vX.Y.Z" section from CHANGELOG.md (header to next ## or EOF).
          # KEEP THIS SCRIPT ASCII-ONLY. GitHub writes the step to a temp file as
          # UTF-8 without BOM, and Windows PowerShell 5.1 parses it as ANSI — any
          # non-ASCII char here turns into mojibake and breaks the parser (that is
          # exactly what made the v0.9.5 release build fail). The Cyrillic release
          # notes themselves are fine: they come from CHANGELOG.md read at runtime,
          # not from this script's own source.
          $tag = "${{ github.ref_name }}"
          $body = "Release $tag"
          if (Test-Path CHANGELOG.md) {
            $content = Get-Content CHANGELOG.md -Raw -Encoding UTF8
            $pattern = "(?ms)^##\s+$([regex]::Escape($tag))\s*\r?\n(.*?)(?=^##\s+v|\z)"
            $m = [regex]::Match($content, $pattern)
            if ($m.Success) {
              $body = $m.Groups[1].Value.Trim()
              Write-Output "Release notes extracted for $tag ($($body.Length) chars)"
            } else {
              Write-Output "WARNING: no CHANGELOG section for $tag, using fallback body"
            }
          }
          # Write UTF-8 WITHOUT BOM so the release body has no stray leading char.
          $out = Join-Path (Get-Location).Path "RELEASE_BODY.md"
          [System.IO.File]::WriteAllText($out, $body, (New-Object System.Text.UTF8Encoding($false)))

      - name: Create GitHub Release with attached installer
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer_output/MeDVeD-Setup-*.exe
            installer_output/MeDVeD-Setup-*.exe.sha256
          body_path: RELEASE_BODY.md
          fail_on_unmatched_files: true
          generate_release_notes: false
